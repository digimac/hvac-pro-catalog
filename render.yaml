services:
  - type: web
    name: hvac-pro-catalog
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --omit=dev && npx esbuild server/index.ts --bundle --platform=node --format=cjs --outfile=dist/index.cjs --minify --define:process.env.NODE_ENV='"production"' --external:express --external:ws --external:pg --external:drizzle-orm --external:passport --external:express-session --external:memorystore
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
